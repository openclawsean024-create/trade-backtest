<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeBacktest - 股票/幣價回測系統</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0071e3; --primary-hover: #0077ed; --secondary: #86868b; --accent: #34c759; --danger: #ff3b30; --warning: #ff9500; --text: #1d1d1f; --text-secondary: #86868b; --bg: #fbfbfd; --card-bg: #ffffff; --border: #d2d2d7; }
        body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .header { background: var(--card-bg); padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 600; color: var(--primary); }
        .container { max-width: 1600px; margin: 0 auto; padding: 24px; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
        select, input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; transition: all 0.2s; }
        select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,113,227,0.15); }
        input[type="number"] { width: 80px; padding: 8px 12px; }
        .btn { padding: 14px 24px; border: none; border-radius: 980px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: #eef4ff; color: var(--primary); }
        #chart { width: 100%; height: 500px; min-height: 400px; }
        .stats-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 16px; margin-top: 24px; }
        .stat-card { background: var(--card-bg); border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-value.positive { color: var(--accent); } .stat-value.negative { color: var(--danger); }
        .strategy-section { margin-bottom: 20px; padding: 16px; background: var(--bg); border-radius: 12px; }
        .strategy-header { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 12px; }
        .strategy-header input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .strategy-name { font-weight: 600; flex: 1; }
        .strategy-params { display: none; padding-left: 28px; } .strategy-params.show { display: block; }
        .param-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; } .param-row label { flex: 1; margin-bottom: 0; font-size: 13px; } .param-row input { width: 80px; padding: 8px 12px; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .strategy-result { background: var(--bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .strategy-result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .strategy-result-title { font-weight: 600; color: var(--primary); }
        .insight-box { background: #f6fbff; border: 1px solid #d9ecff; border-radius: 16px; padding: 18px; margin-top: 18px; }
        .history-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .history-item:last-child { border-bottom: none; }
        .history-meta { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .fundamental-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
        .fundamental-item { background: var(--bg); border-radius: 12px; padding: 14px; }
        .fundamental-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .fundamental-value { font-size: 16px; font-weight: 600; color: var(--text); }
        .fundamental-value.positive { color: var(--accent); }
        .fundamental-value.negative { color: var(--danger); }
        .fundamental-section { margin-top: 16px; }
        .fundamental-section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .fundamental-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .fundamental-row:last-child { border-bottom: none; }
        .fundamental-row-label { color: var(--text-secondary); }
        .fundamental-row-value { font-weight: 500; }
        .fundamental-loading { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }
        .fundamental-error { color: var(--danger); padding: 16px; text-align: center; font-size: 13px; }
        .indicator-pane { margin-top: 16px; }
        .indicator-pane .card-title { font-size: 14px; }
        .indicator-legend { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .indicator-legend span { display: flex; align-items: center; gap: 4px; }
        .indicator-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        #strategyHint { display: none; margin-top: 10px; padding: 10px 14px; background: #fff3e0; border: 1px solid #ffb74d; border-radius: 10px; font-size: 13px; color: #e65100; text-align: center; }
        #strategyHint.show { display: block; }
        .trade-list-section { margin-top: 16px; }
        .trade-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .trade-list-title { font-size: 14px; font-weight: 600; color: var(--text); }
        .trade-list { max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; }
        .trade-row { display: grid; grid-template-columns: 28px 1fr 90px 90px 80px; gap: 8px; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: background 0.15s; }
        .trade-row:last-child { border-bottom: none; }
        .trade-row:hover { background: #f0f4ff; }
        .trade-row .idx { font-weight: 700; color: var(--text-secondary); font-size: 11px; }
        .trade-row .direction { font-weight: 700; font-size: 12px; }
        .trade-row .direction.long { color: #34c759; }
        .trade-row .direction.short { color: #ff3b30; }
        .trade-row .price { font-weight: 500; }
        .trade-row .pnl { font-weight: 600; }
        .trade-row .pnl.positive { color: #34c759; }
        .trade-row .pnl.negative { color: #ff3b30; }
        .trade-row .time { color: var(--text-secondary); font-size: 11px; }
        .trade-list-empty { padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px; }
    </style>
</head>
<body>
    <div class="header"><h1>TradeBacktest</h1><div style="display:flex;align-items:center;gap:10px;"><span id="dataBadge" style="font-size:11px;padding:3px 10px;background:#f3f0ff;color:#7c3aed;border-radius:20px;font-weight:600;">讀取中...</span><span id="retryBtn" style="display:none;font-size:11px;padding:3px 10px;background:rgba(255,149,0,0.15);color:#ff9500;border-radius:20px;font-weight:600;cursor:pointer;" onclick="window._retryBacktest()">🔄 重試</span><div style="color: var(--text-secondary); font-size: 14px;">專業回測系統 v2.3</div></div></div>
    <div class="container">
        <div class="grid">
            <div class="sidebar">
                <div class="card">
                    <div class="card-title">市場選擇</div>
                    <div class="form-group"><label>標的類型</label><select id="marketType" onchange="updateSymbols()"><option value="crypto">加密貨幣</option><option value="stock">股票/指數</option></select></div>
                    <div class="form-group"><label>交易對</label><select id="symbol" onchange="onSymbolChange()"></select></div>
                    <div class="form-group"><label>時間週期</label><select id="timeframe"><option value="1m">1分鐘</option><option value="5m">5分鐘</option><option value="15m">15分鐘</option><option value="1h">1小時</option><option value="4h">4小時</option><option value="1d" selected>1天</option><option value="1w">1週</option></select></div>
                    <div class="form-group"><label>回測期間</label><select id="period"><option value="30">30天</option><option value="90">90天</option><option value="180">180天</option><option value="365">1年</option><option value="730">2年</option><option value="1095">3年</option><option value="1460">4年</option><option value="1825">5年</option><option value="2190" selected>6年</option></select></div>
                    <div class="form-group"><label>初始資金 (USDT)</label><input type="number" id="initialCapital" value="10000" min="1000"></div>
                </div>
                <div class="card" style="margin-top: 20px;" id="fundamentalCard">
                    <div class="card-title">基本分析</div>
                    <div id="fundamentalContent">
                        <div class="fundamental-loading">選擇股票並執行回測後自動載入...</div>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">策略選擇 (可複選)</div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="ma-cross-enable" checked><span class="strategy-name">MA 交叉策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="ma-params"><div class="param-row"><label>短均線天數</label><input type="number" id="ma-short" value="10" min="1"></div><div class="param-row"><label>長均線天數</label><input type="number" id="ma-long" value="30" min="1"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="rsi-enable"><span class="strategy-name">RSI 超買超賣</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="rsi-params"><div class="param-row"><label>RSI 週期</label><input type="number" id="rsi-period" value="14" min="1"></div><div class="param-row"><label>買入 threshold</label><input type="number" id="rsi-oversold" value="30" min="0" max="100"></div><div class="param-row"><label>賣出 threshold</label><input type="number" id="rsi-overbought" value="70" min="0" max="100"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="macd-enable"><span class="strategy-name">MACD 策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="macd-params"><div class="param-row"><label>Fast EMA</label><input type="number" id="macd-fast" value="12" min="1"></div><div class="param-row"><label>Slow EMA</label><input type="number" id="macd-slow" value="26" min="1"></div><div class="param-row"><label>Signal</label><input type="number" id="macd-signal" value="9" min="1"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="bollinger-enable"><span class="strategy-name">布林通道策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="bollinger-params"><div class="param-row"><label>週期</label><input type="number" id="bb-period" value="20" min="1"></div><div class="param-row"><label>標準差倍數</label><input type="number" id="bb-std" value="2" min="0.5" step="0.5"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="momentum-enable"><span class="strategy-name">動量策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="momentum-params"><div class="param-row"><label>連續漲跌天數</label><input type="number" id="momentum-days" value="3" min="1"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="candlestick-enable"><span class="strategy-name">K線型態策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="candlestick-params"><div class="param-row"><label>型態類型</label><select id="candlestick-type"><option value="all">全部型態</option><option value="doji">十字星 (Doji)</option><option value="hammer">錘子 (Hammer)</option><option value="engulfing">吞噬 (Engulfing)</option><option value="morning_star">晨星</option><option value="evening_star">暮星</option><option value="shooting_star">射擊之星</option></select></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="volume-enable"><span class="strategy-name">量價關係策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="volume-params"><div class="param-row"><label>成交量倍率 Threshold</label><input type="number" id="volume-threshold" value="1.5" min="1" step="0.1"></div><div class="param-row"><label>策略類型</label><select id="volume-type"><option value="breakout">放量突破</option><option value="volume_surge">放量上漲/縮量下跌</option><option value="obv">OBV 能量潮</option></select></div></div></div>
                    <button class="btn btn-primary" onclick="runBacktest()" style="margin-top: 16px; width: 100%;">開始回測</button>
                    <div id="strategyHint">⚠️ 請至少選擇一個策略</div>
                </div>
                <div class="card" style="margin-top:20px;"><div class="card-title">最近回測 Session</div><div id="historyList"></div></div>
            </div>
            <div class="main">
                <div class="card"><div class="card-title">K線圖表</div><div id="chart"></div><div id="loading" class="loading" style="display: none;">正在計算回測...</div></div>
                <div class="stats-grid" id="stats" style="display: none;"><div class="stat-card"><div class="stat-label">總報酬率</div><div class="stat-value" id="totalReturn">0%</div></div><div class="stat-card"><div class="stat-label">最大回撤</div><div class="stat-value negative" id="maxDrawdown">0%</div></div><div class="stat-card"><div class="stat-label">勝率</div><div class="stat-value" id="winRate">0%</div></div><div class="stat-card"><div class="stat-label">交易次數</div><div class="stat-value" id="totalTrades">0</div></div><div class="stat-card"><div class="stat-label">最終資金</div><div class="stat-value" id="finalCapital">$0</div></div><div class="stat-card"><div class="stat-label">Sharpe Ratio</div><div class="stat-value" id="sharpeRatio">0</div></div><div class="stat-card"><div class="stat-label">Profit Factor</div><div class="stat-value" id="profitFactor">0</div></div><div class="stat-card"><div class="stat-label">平均持倉</div><div class="stat-value" id="avgHoldTime">0h</div></div></div>
                <div class="card" id="results" style="display: none; margin-top: 24px;"><div class="card-title">各策略表現</div><div id="strategyResults"></div><div class="insight-box" id="insightBox" style="display:none;"></div><div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;"><button class="btn btn-secondary" onclick="saveSession()">保存回測紀錄</button><button class="btn btn-secondary" onclick="exportSession()">匯出 JSON</button><button class="btn btn-secondary" onclick="exportGPX(latestBacktestData, latestBacktestSymbol)">下載 GPX</button><button class="btn btn-secondary" onclick="exportFIT(latestBacktestData, latestBacktestSymbol)">下載 FIT/CSV</button><button class="btn btn-secondary" onclick="showQRModal()">📱 QR 分享</button></div></div>
            </div>
        </div>
    </div>
    <script>
        const SESSION_KEY = 'trade-backtest-sessions-v1';
        let chart, candleSeries;
        let rsiSeries = null, macdLineSeries = null, signalLineSeries = null, histogramSeries = null;
        let maLineSeries1 = null, maLineSeries2 = null;
        let markerSeries = null;
        let allFlatTrades = []; // [{entryIdx, exitIdx, entryTime, exitTime, entryPrice, exitPrice, profit, profitPercent, direction, strategy}]
        let latestSessionPayload = null, latestBacktestData = null, latestBacktestSymbol = null;
        const cryptoSymbols = [ { value: 'BTCUSDT', label: 'BTC/USDT 比特幣' }, { value: 'ETHUSDT', label: 'ETH/USDT 以太坊' }, { value: 'BNBUSDT', label: 'BNB/USDT 幣安幣' }, { value: 'SOLUSDT', label: 'SOL/USDT Solana' }, { value: 'XRPUSDT', label: 'XRP/USDT 瑞波幣' }, { value: 'DOGEUSDT', label: 'DOGE/USDT 狗狗幣' }, { value: 'ADAUSDT', label: 'ADA/USDT 艾達幣' }, { value: 'AVAXUSDT', label: 'AVAX/USDT 雪崩' } ];
        const stockSymbols = [ { value: 'AAPL', label: 'AAPL 蘋果' }, { value: 'GOOGL', label: 'GOOGL 谷歌' }, { value: 'MSFT', label: 'MSFT 微軟' }, { value: 'TSLA', label: 'TSLA 特斯拉' }, { value: 'AMZN', label: 'AMZN 亞馬遜' }, { value: 'META', label: 'META Meta' }, { value: 'NVDA', label: 'NVDA 輝達' }, { value: 'AMD', label: 'AMD 超微' } ];
        const startPrices = { 'BTCUSDT': 45000, 'ETHUSDT': 2500, 'BNBUSDT': 300, 'SOLUSDT': 100, 'XRPUSDT': 0.6, 'DOGEUSDT': 0.08, 'ADAUSDT': 0.5, 'AVAXUSDT': 35, 'AAPL': 180, 'GOOGL': 140, 'MSFT': 380, 'TSLA': 250, 'AMZN': 180, 'META': 480, 'NVDA': 800, 'AMD': 150 };
        function getSessions(){ try { return JSON.parse(localStorage.getItem(SESSION_KEY) || '[]'); } catch { return []; } }
        function setSessions(items){ localStorage.setItem(SESSION_KEY, JSON.stringify(items)); }
        function renderHistory(){ const items = getSessions(); const el = document.getElementById('historyList'); if(!items.length){ el.innerHTML = '<div class="history-meta">尚無回測紀錄</div>'; return; } el.innerHTML = items.map(item => `<div class="history-item"><div><strong>${item.symbol}</strong> ｜ ${item.bestStrategy}</div><div class="history-meta">${new Date(item.createdAt).toLocaleString('zh-TW')} ｜ ${item.timeframe} ｜ ${item.period}天 ｜ Avg Return ${item.avgReturn.toFixed(2)}%</div></div>`).join(''); }
        function updateSymbols() { const type = document.getElementById('marketType').value; const select = document.getElementById('symbol'); const symbols = type === 'crypto' ? cryptoSymbols : stockSymbols; select.innerHTML = symbols.map(s => `<option value="${s.value}">${s.label}</option>`).join(''); }
        document.querySelectorAll('.strategy-header').forEach(header => { header.addEventListener('click', (e) => { if (e.target.type !== 'checkbox') header.nextElementSibling.classList.toggle('show'); }); });
        // Strategy checkbox: change → immediately re-run backtest + update indicators on chart
        ['ma-cross-enable','rsi-enable','macd-enable','bollinger-enable','momentum-enable','candlestick-enable','volume-enable'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('change', () => { if (window._chartReady) runBacktest(); });
        });
        function initChart() {
            const chartContainer = document.getElementById('chart');
            const width = chartContainer.clientWidth || chartContainer.offsetWidth || 800;
            chart = LightweightCharts.createChart(chartContainer, {
                width: width,
                height: 500,
                layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#333' },
                grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } },
                rightPriceScale: { borderColor: '#ddd' },
                timeScale: { borderColor: '#ddd' },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#34c759', downColor: '#ff3b30',
                borderDownColor: '#ff3b30', borderUpColor: '#34c759',
                wickDownColor: '#ff3b30', wickUpColor: '#34c759'
            });
            // RSI pane
            rsiSeries = chart.addLineSeries({
                color: '#9b59b6', lineWidth: 2,
                priceScaleId: 'rsi', axisLabelVisible: true
            });
            chart.priceScale('rsi').applyOptions({
                scaleMargins: { top: 0.75, bottom: 0 },
                borderColor: '#ddd'
            });
            // MACD pane
            macdLineSeries = chart.addLineSeries({ color: '#0071e3', lineWidth: 2, priceScaleId: 'macd' });
            signalLineSeries = chart.addLineSeries({ color: '#ff9500', lineWidth: 2, priceScaleId: 'macd' });
            histogramSeries = chart.addHistogramSeries({
                color: '#34c759',
                priceScaleId: 'macd',
                priceFormat: { type: 'price', precision: 4, minMove: 0.0001 }
            });
            chart.priceScale('macd').applyOptions({
                scaleMargins: { top: 0.85, bottom: 0 },
                borderColor: '#ddd'
            });
            window.addEventListener('resize', () => {
                const w = chartContainer.clientWidth || chartContainer.offsetWidth || 800;
                chart.applyOptions({ width: w });
            });
        }
        async function fetchRealData(symbol, days) {
            // Fetch real OHLCV data via Vercel serverless API (bypasses CORS)
            // This serverless function proxies Binance / Yahoo Finance requests
            const tfMap = { '1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d','1w':'1w' };
            const interval = tfMap[document.getElementById('timeframe').value] || '1d';
            try {
                const url = `/api/klines?symbol=${encodeURIComponent(symbol)}&days=${days}&interval=${encodeURIComponent(interval)}`;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!res.ok) throw new Error(`K-lines API error: ${res.status}`);
                const json = await res.json();
                if (!json.success || !json.data || json.data.length < 10) {
                    throw new Error(json.error || 'No data returned');
                }
                return json.data;
            } catch(e) {
                console.warn('Real data fetch failed:', e.message);
                const isTimeout = e.name === 'AbortError' || e.message.includes('aborted');
                window._fetchError = isTimeout ? 'timeout' : 'fetch_failed';
                return null;
            }
        }
        
        // Scroll chart to a specific bar time
        function scrollToTrade(time) {
            if (!chart || !time) return;
            chart.timeScale().scrollToPosition(2, false); // scroll so the bar is visible
            const barInfo = chart.timeScale().getVisibleLogicalRange();
            chart.timeScale().setVisibleRange({
                from: time - 86400 * 5,
                to: time + 86400 * 5

                        <span><span class="direction ${t.direction}">${t.direction === 'long' ? '▲ 多' : '▼ 空'}</span> <span style="color:var(--text-secondary);font-size:10px;">${t.strategy}</span></span>
                        <span class="price">$${t.entryPrice.toFixed(2)}</span>
                        <span class="price">$${t.exitPrice.toFixed(2)}</span>
                        <span class="pnl ${t.profitPercent >= 0 ? 'positive' : 'negative'}">${t.profitPercent >= 0 ? '+' : ''}${t.profitPercent.toFixed(2)}%</span>
                    </div>`).join('')}
                   </div>`
                : `<div class="trade-list-empty">尚無交易記錄</div>`;
            document.getElementById('strategyResults').innerHTML = strategyHTML +
                `<div class="trade-list-section"><div class="trade-list-header"><span class="trade-list-title">📋 交易明細（共 ${allFlatTrades.length} 筆）— 點擊滑動至該筆進場</span></div>${tradeListHTML}</div>`;
            const insightBox = document.getElementById('insightBox'); insightBox.style.display = 'block'; insightBox.innerHTML = buildInsight(strategyResults, bestStrategy, avgReturn, avgWinRate);
            // Aggregate new risk metrics across all strategies
            const totalGrossProfit = strategyResults.reduce((s, r) => s + (r.result.grossProfit || 0), 0);
            const totalGrossLoss = strategyResults.reduce((s, r) => s + (r.result.grossLoss || 0), 0);
            const totalAvgHold = strategyResults.reduce((s, r) => s + (r.result.avgHoldTimeSec || 0), 0) / Math.max(strategyResults.length, 1);
            const aggregatePF = totalGrossLoss > 0 ? totalGrossProfit / totalGrossLoss : totalGrossProfit > 0 ? 999.99 : 0;
            const allReturns = strategyResults.flatMap(r => r.result.trades.map(t => t.profitPercent / 100));
            const avgReturnPct = avgReturn / 100;
            const stdDev = allReturns.length > 1 ? Math.sqrt(allReturns.reduce((s, r) => s + Math.pow(r - avgReturnPct, 2), 0) / Math.max(allReturns.length - 1, 1)) : 0;
            const sharpe = stdDev > 0 ? (avgReturnPct / stdDev) : 0;
            document.getElementById('sharpeRatio').textContent = sharpe >= 0 ? '+' + sharpe.toFixed(2) : sharpe.toFixed(2);
            document.getElementById('sharpeRatio').className = 'stat-value ' + (sharpe >= 0 ? 'positive' : 'negative');
            document.getElementById('profitFactor').textContent = formatProfitFactor(aggregatePF);
            document.getElementById('profitFactor').className = 'stat-value ' + (aggregatePF >= 1 ? 'positive' : 'negative');
            document.getElementById('avgHoldTime').textContent = formatHoldTime(totalAvgHold);
            latestSessionPayload = { createdAt: new Date().toISOString(), symbol: document.getElementById('symbol').value, marketType: document.getElementById('marketType').value, timeframe: document.getElementById('timeframe').value, period, initialCapital: parseFloat(document.getElementById('initialCapital').value), bestStrategy, avgReturn, avgWinRate, totalTrades, strategyResults: strategyResults.map(s => ({ name: s.name, totalReturn: s.result.totalReturn, winRate: s.result.winRate, totalTrades: s.result.totalTrades, maxDrawdown: s.result.maxDrawdown, finalCapital: s.result.finalCapital, grossProfit: s.result.grossProfit, grossLoss: s.result.grossLoss, profitFactor: s.result.profitFactor, sharpeRatio: sharpe, avgHoldTimeSec: totalAvgHold, params: s.params, trades: s.result.trades || [] })) };
            latestBacktestData = data;
            latestBacktestSymbol = symbol;
            loading.style.display = 'none'; stats.style.display = 'grid'; results.style.display = 'block'; }
        function exportGPX(data, symbol) {
            const tf = document.getElementById('timeframe').value;
            let timeMultiplier = 60;
            if (tf === '5m') timeMultiplier = 300;
            else if (tf === '15m') timeMultiplier = 900;
            else if (tf === '1h') timeMultiplier = 3600;
            else if (tf === '4h') timeMultiplier = 14400;
            else if (tf === '1d') timeMultiplier = 86400;
            else if (tf === '1w') timeMultiplier = 604800;
            else if (tf === '1m') timeMultiplier = 60;

            // Collect all trades from all strategies
            const allTrades = [];
            if (latestSessionPayload && latestSessionPayload.strategyResults) {
                latestSessionPayload.strategyResults.forEach(sr => {
                    if (sr.trades && sr.trades.length > 0) {
                        sr.trades.forEach(t => {
                            // Find the candle index for entry and exit
                            const entryIdx = data.findIndex(d => Math.abs(d.close - t.entryPrice) < t.entryPrice * 0.02);
                            const exitIdx = data.findIndex(d => Math.abs(d.close - t.exitPrice) < t.exitPrice * 0.02);
                            if (entryIdx >= 0) allTrades.push({ ...t, strategy: sr.name, idx: entryIdx, action: 'BUY', seq: 'entry' });
                            if (exitIdx >= 0) allTrades.push({ ...t, strategy: sr.name, idx: exitIdx, action: 'SELL', seq: 'exit' });
                        });
                    }
                });
            }

            let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n';
            gpx += '<gpx version="1.1" creator="TradeBacktest" xmlns="http://www.topografix.com/GPX/1/1">\n';
            gpx += '  <metadata><name>' + symbol + ' 回測軌跡</name><desc>Generated by TradeBacktest v2.3</desc></metadata>\n';
            gpx += '  <trk><name>' + symbol + ' 價格走勢</name><trkseg>\n';
            data.forEach((d, i) => {
                const dt = new Date(d.time * 1000).toISOString();
                const tradeAtIdx = allTrades.filter(t => t.idx === i);
                const actions = tradeAtIdx.map(t => t.action).join(',');
                const strategies = tradeAtIdx.map(t => t.strategy).join(',');
                const profitPct = tradeAtIdx.length > 0 ? tradeAtIdx[0].profitPercent : null;
                gpx += '    <trkpt lat="' + (d.close / 100000).toFixed(6) + '" lon="' + (i * 0.0001).toFixed(6) + '"><time>' + dt + '</time><extensions>';
                gpx += '<price>' + d.close.toFixed(4) + '</price>';
                gpx += '<volume>' + d.volume.toFixed(0) + '</volume>';
                if (actions) gpx += '<action>' + actions + '</action>';
                if (strategies) gpx += '<strategy>' + strategies + '</strategy>';
                if (profitPct !== null) gpx += '<profitPct>' + profitPct.toFixed(2) + '</profitPct>';
                gpx += '</extensions></trkpt>\n';
            });
            gpx += '  </trkseg></trk></gpx>\n';

            // Add waypoints for each trade entry/exit
            if (allTrades.length > 0) {
                gpx += '  <wpt lat="0" lon="0"><name>Trade Markers</name><desc>' + allTrades.length + ' trades recorded</desc></wpt>\n';
            }
            gpx += '</gpx>';

            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'backtest-' + symbol + '-' + Date.now() + '.gpx'; a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function exportFIT(data, symbol) {
            // FIT/CSV export: generate a structured CSV that Garmin can import as course data
            // Include trade markers and price progression
            let csv = 'Timestamp,Open,High,Low,Close,Volume,TradeAction,Strategy,ProfitPct\n';
            const allTrades = [];
            if (latestSessionPayload && latestSessionPayload.strategyResults) {
                latestSessionPayload.strategyResults.forEach(sr => {
                    if (sr.trades && sr.trades.length > 0) {
                        sr.trades.forEach(t => {
                            const entryIdx = data.findIndex(d => Math.abs(d.close - t.entryPrice) < t.entryPrice * 0.02);
                            const exitIdx = data.findIndex(d => Math.abs(d.close - t.exitPrice) < t.exitPrice * 0.02);
                            if (entryIdx >= 0) allTrades.push({ ...t, strategy: sr.name, idx: entryIdx, action: 'BUY' });
                            if (exitIdx >= 0) allTrades.push({ ...t, strategy: sr.name, idx: exitIdx, action: 'SELL' });
                        });
                    }
                });
            }

            data.forEach((d, i) => {
                const dt = new Date(d.time * 1000).toISOString();
                const tradeAtIdx = allTrades.filter(t => t.idx === i);
                const action = tradeAtIdx.map(t => t.action).join('|');
                const strategy = tradeAtIdx.map(t => t.strategy).join('|');
                const profitPct = tradeAtIdx.length > 0 ? tradeAtIdx[0].profitPercent : '';
                csv += dt + ',' + d.open.toFixed(4) + ',' + d.high.toFixed(4) + ',' + d.low.toFixed(4) + ',' + d.close.toFixed(4) + ',' + d.volume.toFixed(0) + ',' + action + ',' + strategy + ',' + profitPct + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'backtest-' + symbol + '-' + Date.now() + '.csv'; a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function generateQRCode() {
            const el = document.getElementById('qrcodeCanvas');
            if (!el) return;
            if (!latestSessionPayload) { alert('請先執行一次回測'); return; }
            const data = JSON.stringify({
                symbol: latestSessionPayload.symbol,
                return: latestSessionPayload.avgReturn.toFixed(2) + '%',
                sharpe: (document.getElementById('sharpeRatio')?.textContent || 'N/A'),
                pf: (document.getElementById('profitFactor')?.textContent || 'N/A'),
                trades: latestSessionPayload.totalTrades
            });
            el.innerHTML = '';
            QRCode.toCanvas(el, data, { width: 200, margin: 2 }, (err) => {
                if (err) { el.innerHTML = '<span style="color:var(--danger);font-size:12px">QR 生成失敗</span>'; }
            });
        }

        function showQRModal() {
            const modal = document.getElementById('qrModal') || (() => {
                const m = document.createElement('div'); m.id = 'qrModal'; m.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;';
                m.innerHTML = '<div style="background:#fff;border-radius:20px;padding:32px;text-align:center;max-width:320px;"><h3 style="margin-bottom:16px;">📱 分享回測結果</h3><canvas id="qrcodeCanvas"></canvas><p style="margin-top:12px;font-size:12px;color:#86868b;">掃描以查看回測摘要</p><button onclick="this.closest(\'#qrModal\').remove()" style="margin-top:16px;padding:10px 24px;background:#0071e3;color:#fff;border:none;border-radius:980px;cursor:pointer;">關閉</button></div>';
                document.body.appendChild(m); return m;
            })();
            modal.style.display = 'flex';
            generateQRCode();
        }

        function formatHoldTime(sec) {
            if (sec >= 86400) return (sec / 86400).toFixed(1) + 'd';
            if (sec >= 3600) return (sec / 3600).toFixed(1) + 'h';
            return Math.round(sec / 60) + 'm';
        }

        function formatProfitFactor(pf) {
            if (pf === Infinity || pf > 9999) return '∞';
            return pf.toFixed(2);
        }

        function saveSession() {
            const hint = document.getElementById('strategyHint');
            if (!latestSessionPayload) {
                if (hint) { hint.textContent = '⚠️ 請先執行一次回測'; hint.style.display = 'block'; }
                return;
            }
            const items = getSessions(); items.unshift(latestSessionPayload); setSessions(items.slice(0, 20)); renderHistory();
            if (hint) { hint.textContent = '✅ 已保存回測紀錄'; hint.style.display = 'block'; setTimeout(() => { hint.style.display = 'none'; }, 3000); }
        }
        function exportSession() {
            const hint = document.getElementById('strategyHint');
            if (!latestSessionPayload) {
                if (hint) { hint.textContent = '⚠️ 請先執行一次回測'; hint.style.display = 'block'; }
                return;
            }
            const blob = new Blob([JSON.stringify(latestSessionPayload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `backtest-${latestSessionPayload.symbol}-${Date.now()}.json`; a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
        updateSymbols();
        requestAnimationFrame(() => {
            initChart();
            window._chartReady = true;
            renderHistory();
            runBacktest();
        });

        // Sync chart + run backtest when symbol changes
        async function onSymbolChange() {
            const marketType = document.getElementById('marketType').value;
            const symbol = document.getElementById('symbol').value;

            // Update badge immediately with symbol so user gets instant feedback
            const startPrice = startPrices[symbol] || 0;
            updateDataBadge(symbol, startPrice, 'loading');

            // Show loading state immediately
            const loading = document.getElementById('loading');
            const stats = document.getElementById('stats');
            const results = document.getElementById('results');
            if (loading) loading.style.display = 'block';
            if (stats) stats.style.display = 'none';
            if (results) results.style.display = 'none';

            // Fetch fundamental data in parallel with backtest
            if (marketType === 'stock') {
                fetchFundamentalData(symbol);
            } else {
                document.getElementById('fundamentalContent').innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text-secondary);">
                        <div style="font-size:24px;margin-bottom:8px;">₿</div>
                        <div style="font-size:13px;">加密貨幣無基本分析數據</div>
                    </div>`;
            }

            // Run full backtest: updates chart + all strategy stats
            await runBacktest();
        }

        async function fetchFundamentalData(symbol) {
            const el = document.getElementById('fundamentalContent');
            el.innerHTML = '<div class="fundamental-loading">正在載入基本數據...</div>';
            try {
                // Call Vercel serverless API route (bypasses CORS)
                const resp = await fetch(`/api/fundamental?symbol=${encodeURIComponent(symbol)}`);
                const json = await resp.json();

                if (!json.success || !json.data) {
                    throw new Error(json.error || 'No data returned');
                }

                const d = json.data;
                const pctClass = (v) => {
                    if (v === 'N/A') return 'fundamental-row-value';
                    const n = parseFloat(v);
                    return 'fundamental-row-value fundamental-value ' + (n > 0 ? 'positive' : 'negative');
                };

                el.innerHTML = `
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);">
                        <div style="font-size:28px;font-weight:700;">${d.price !== 'N/A' ? '$' + d.price : ''}</div>
                        <div>
                            <div style="font-size:14px;font-weight:600;color:var(--text);">${d.longName}</div>
                            <div style="font-size:11px;color:var(--text-secondary);">${d.sector !== 'N/A' ? d.sector + ' · ' + d.industry : d.currency}</div>
                        </div>
                        <div style="margin-left:auto;text-align:right;">
                            <div style="font-size:11px;color:var(--text-secondary);">分析師評級</div>
                            <div style="font-size:12px;font-weight:600;color:var(--primary);text-transform:capitalize;">${d.recommendation}</div>
                        </div>
                    </div>
                    <div class="fundamental-section-title">估值指標</div>
                    <div class="fundamental-grid">
                        <div class="fundamental-item"><div class="fundamental-label">P/E 本益比</div><div class="fundamental-value">${d.pe}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">Forward P/E</div><div class="fundamental-value">${d.forwardPE}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">P/B 股價淨值比</div><div class="fundamental-value">${d.priceToBook}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">總市值</div><div class="fundamental-value">${d.marketCap}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">企業價值</div><div class="fundamental-value">${d.enterpriseValue}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">Beta</div><div class="fundamental-value">${d.beta}</div></div>
                    </div>
                    <div class="fundamental-section">
                        <div class="fundamental-section-title">獲利能力</div>
                        <div class="fundamental-row"><span class="fundamental-row-label">營收 (TTM)</span><span class="fundamental-row-value">${d.revenue}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">毛利率</span><span class="${pctClass(d.grossMargin)}">${d.grossMargin}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">營業利率</span><span class="${pctClass(d.opMargin)}">${d.opMargin}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">淨利率</span><span class="${pctClass(d.netMargin)}">${d.netMargin}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">ROE 股東權益報酬</span><span class="${pctClass(d.roe)}">${d.roe}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">自由現金流</span><span class="fundamental-row-value">${d.freeCashflow}</span></div>
                    </div>
                    <div class="fundamental-section">
                        <div class="fundamental-section-title">股利 & 風險</div>
                        <div class="fundamental-row"><span class="fundamental-row-label">股息</span><span class="fundamental-row-value">${d.dividend}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">殖利率</span><span class="fundamental-row-value fundamental-value positive">${d.divYield}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">EPS 每股盈餘</span><span class="fundamental-row-value">$${d.eps}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">負債/權益</span><span class="fundamental-row-value">${d.debtToEquity}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">分析師目標價</span><span class="fundamental-row-value">${d.analystTarget}</span></div>
                    </div>
                    <div class="fundamental-section">
                        <div class="fundamental-section-title">交易量 & 區間</div>
                        <div class="fundamental-row"><span class="fundamental-row-label">平均日成交量</span><span class="fundamental-row-value">${d.avgVolume}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">52W 高</span><span class="fundamental-row-value" style="color:var(--danger)">$${d.week52High}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">52W 低</span><span class="fundamental-row-value" style="color:var(--accent)">$${d.week52Low}</span></div>
                    </div>
                `;
            } catch (e) {
                el.innerHTML = `<div class="fundamental-error">無法載入基本數據（${symbol}）<br><span style="font-size:11px;color:var(--text-secondary);">API 錯誤：${e.message}</span></div>`;
            }
        }
    </script>
</body>
</html>
