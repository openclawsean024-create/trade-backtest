<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeBacktest - 股票/幣價回測系統</title>
    <script src="/lightweight-charts.4.1.0.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0071e3; --primary-hover: #0077ed; --secondary: #86868b; --accent: #34c759; --danger: #ff3b30; --warning: #ff9500; --text: #1d1d1f; --text-secondary: #86868b; --bg: #fbfbfd; --card-bg: #ffffff; --border: #d2d2d7; }
        body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .header { background: var(--card-bg); padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 600; color: var(--primary); }
        .container { max-width: 1600px; margin: 0 auto; padding: 24px; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
        select, input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; transition: all 0.2s; }
        select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,113,227,0.15); }
        input[type="number"] { width: 80px; padding: 8px 12px; }
        .btn { padding: 14px 24px; border: none; border-radius: 980px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: #eef4ff; color: var(--primary); }
        #chart { width: 100%; height: 500px; min-height: 400px; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 24px; }
        .stat-card { background: var(--card-bg); border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-value.positive { color: var(--accent); } .stat-value.negative { color: var(--danger); }
        .strategy-section { margin-bottom: 20px; padding: 16px; background: var(--bg); border-radius: 12px; }
        .strategy-header { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 12px; }
        .strategy-header input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .strategy-name { font-weight: 600; flex: 1; }
        .strategy-params { display: none; padding-left: 28px; } .strategy-params.show { display: block; }
        .param-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; } .param-row label { flex: 1; margin-bottom: 0; font-size: 13px; } .param-row input { width: 80px; padding: 8px 12px; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .strategy-result { background: var(--bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .strategy-result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .strategy-result-title { font-weight: 600; color: var(--primary); }
        .insight-box { background: #f6fbff; border: 1px solid #d9ecff; border-radius: 16px; padding: 18px; margin-top: 18px; }
        .history-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .history-item:last-child { border-bottom: none; }
        .history-meta { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .fundamental-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
        .fundamental-item { background: var(--bg); border-radius: 12px; padding: 14px; }
        .fundamental-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .fundamental-value { font-size: 16px; font-weight: 600; color: var(--text); }
        .fundamental-value.positive { color: var(--accent); }
        .fundamental-value.negative { color: var(--danger); }
        .fundamental-section { margin-top: 16px; }
        .fundamental-section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .fundamental-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .fundamental-row:last-child { border-bottom: none; }
        .fundamental-row-label { color: var(--text-secondary); }
        .fundamental-row-value { font-weight: 500; }
        .fundamental-loading { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }
        .fundamental-error { color: var(--danger); padding: 16px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header"><h1>TradeBacktest</h1><div style="display:flex;align-items:center;gap:10px;"><span id="dataBadge" style="font-size:11px;padding:3px 10px;background:#f3f0ff;color:#7c3aed;border-radius:20px;font-weight:600;">讀取中...</span><div style="color: var(--text-secondary); font-size: 14px;">專業回測系統 v2.3</div></div></div>
    <div class="container">
        <div class="grid">
            <div class="sidebar">
                <div class="card">
                    <div class="card-title">市場選擇</div>
                    <div class="form-group"><label>標的類型</label><select id="marketType" onchange="updateSymbols()"><option value="crypto">加密貨幣</option><option value="stock">股票/指數</option></select></div>
                    <div class="form-group"><label>交易對</label><select id="symbol" onchange="onSymbolChange()"></select></div>
                    <div class="form-group"><label>時間週期</label><select id="timeframe"><option value="15m">15分鐘</option><option value="1h">1小時</option><option value="4h">4小時</option><option value="1d" selected>1天</option><option value="1w">1週</option></select></div>
                    <div class="form-group"><label>回測期間</label><select id="period"><option value="30">30天</option><option value="90">90天</option><option value="180">180天</option><option value="365">1年</option><option value="730">2年</option><option value="1095">3年</option><option value="1460">4年</option><option value="1825">5年</option><option value="2190">6年</option></select></div>
                    <div class="form-group"><label>初始資金 (USDT)</label><input type="number" id="initialCapital" value="10000" min="1000"></div>
                </div>
                <div class="card" style="margin-top: 20px;" id="fundamentalCard">
                    <div class="card-title">基本分析</div>
                    <div id="fundamentalContent">
                        <div class="fundamental-loading">選擇股票並執行回測後自動載入...</div>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">策略選擇 (可複選)</div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="ma-cross-enable"><span class="strategy-name">MA 交叉策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="ma-params"><div class="param-row"><label>短均線天數</label><input type="number" id="ma-short" value="20" min="1"></div><div class="param-row"><label>長均線天數</label><input type="number" id="ma-long" value="50" min="1"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="rsi-enable"><span class="strategy-name">RSI 超買超賣</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="rsi-params"><div class="param-row"><label>RSI 週期</label><input type="number" id="rsi-period" value="14" min="1"></div><div class="param-row"><label>買入 threshold</label><input type="number" id="rsi-oversold" value="30" min="0" max="100"></div><div class="param-row"><label>賣出 threshold</label><input type="number" id="rsi-overbought" value="70" min="0" max="100"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="macd-enable"><span class="strategy-name">MACD 策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="macd-params"><div class="param-row"><label>Fast EMA</label><input type="number" id="macd-fast" value="12" min="1"></div><div class="param-row"><label>Slow EMA</label><input type="number" id="macd-slow" value="26" min="1"></div><div class="param-row"><label>Signal</label><input type="number" id="macd-signal" value="9" min="1"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="bollinger-enable"><span class="strategy-name">布林通道策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="bollinger-params"><div class="param-row"><label>週期</label><input type="number" id="bb-period" value="20" min="1"></div><div class="param-row"><label>標準差倍數</label><input type="number" id="bb-std" value="2" min="0.5" step="0.5"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="momentum-enable"><span class="strategy-name">動量策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="momentum-params"><div class="param-row"><label>連續漲跌天數</label><input type="number" id="momentum-days" value="3" min="1"></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="candlestick-enable"><span class="strategy-name">K線型態策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="candlestick-params"><div class="param-row"><label>型態類型</label><select id="candlestick-type"><option value="all">全部型態</option><option value="doji">十字星 (Doji)</option><option value="hammer">錘子 (Hammer)</option><option value="engulfing">吞噬 (Engulfing)</option><option value="morning_star">晨星</option><option value="evening_star">暮星</option><option value="shooting_star">射擊之星</option></select></div></div></div>
                    <div class="strategy-section"><div class="strategy-header"><input type="checkbox" id="volume-enable"><span class="strategy-name">量價關係策略</span><span style="color: var(--text-secondary); font-size: 12px;">▼</span></div><div class="strategy-params" id="volume-params"><div class="param-row"><label>成交量倍率 Threshold</label><input type="number" id="volume-threshold" value="1.5" min="1" step="0.1"></div><div class="param-row"><label>策略類型</label><select id="volume-type"><option value="breakout">放量突破</option><option value="volume_surge">放量上漲/縮量下跌</option><option value="obv">OBV 能量潮</option></select></div></div></div>
                    <button class="btn btn-primary" onclick="runBacktest()" style="margin-top: 16px; width: 100%;">開始回測</button>
                </div>
                <div class="card" style="margin-top:20px;"><div class="card-title">最近回測 Session</div><div id="historyList"></div></div>
            </div>
            <div class="main">
                <div class="card"><div class="card-title">K線圖表</div><div id="chart"></div><div id="loading" class="loading" style="display: none;">正在計算回測...</div></div>
                <div class="stats-grid" id="stats" style="display: none;"><div class="stat-card"><div class="stat-label">總報酬率</div><div class="stat-value" id="totalReturn">0%</div></div><div class="stat-card"><div class="stat-label">最大回撤</div><div class="stat-value negative" id="maxDrawdown">0%</div></div><div class="stat-card"><div class="stat-label">勝率</div><div class="stat-value" id="winRate">0%</div></div><div class="stat-card"><div class="stat-label">交易次數</div><div class="stat-value" id="totalTrades">0</div></div><div class="stat-card"><div class="stat-label">最終資金</div><div class="stat-value" id="finalCapital">$0</div></div></div>
                <div class="card" id="results" style="display: none; margin-top: 24px;"><div class="card-title">各策略表現</div><div id="strategyResults"></div><div class="insight-box" id="insightBox" style="display:none;"></div><div style="display:flex;gap:12px;margin-top:16px;"><button class="btn btn-secondary" onclick="saveSession()">保存回測紀錄</button><button class="btn btn-secondary" onclick="exportSession()">匯出 JSON</button></div></div>
            </div>
        </div>
    </div>
    <script>
        const SESSION_KEY = 'trade-backtest-sessions-v1';
        let chart, candleSeries, latestSessionPayload = null;
        const cryptoSymbols = [ { value: 'BTCUSDT', label: 'BTC/USDT 比特幣' }, { value: 'ETHUSDT', label: 'ETH/USDT 以太坊' }, { value: 'BNBUSDT', label: 'BNB/USDT 幣安幣' }, { value: 'SOLUSDT', label: 'SOL/USDT Solana' }, { value: 'XRPUSDT', label: 'XRP/USDT 瑞波幣' }, { value: 'DOGEUSDT', label: 'DOGE/USDT 狗狗幣' }, { value: 'ADAUSDT', label: 'ADA/USDT 艾達幣' }, { value: 'AVAXUSDT', label: 'AVAX/USDT 雪崩' } ];
        const stockSymbols = [ { value: 'AAPL', label: 'AAPL 蘋果' }, { value: 'GOOGL', label: 'GOOGL 谷歌' }, { value: 'MSFT', label: 'MSFT 微軟' }, { value: 'TSLA', label: 'TSLA 特斯拉' }, { value: 'AMZN', label: 'AMZN 亞馬遜' }, { value: 'META', label: 'META Meta' }, { value: 'NVDA', label: 'NVDA 輝達' }, { value: 'AMD', label: 'AMD 超微' } ];
        const startPrices = { 'BTCUSDT': 45000, 'ETHUSDT': 2500, 'BNBUSDT': 300, 'SOLUSDT': 100, 'XRPUSDT': 0.6, 'DOGEUSDT': 0.08, 'ADAUSDT': 0.5, 'AVAXUSDT': 35, 'AAPL': 180, 'GOOGL': 140, 'MSFT': 380, 'TSLA': 250, 'AMZN': 180, 'META': 480, 'NVDA': 800, 'AMD': 150 };
        function getSessions(){ try { return JSON.parse(localStorage.getItem(SESSION_KEY) || '[]'); } catch { return []; } }
        function setSessions(items){ localStorage.setItem(SESSION_KEY, JSON.stringify(items)); }
        function renderHistory(){ const items = getSessions(); const el = document.getElementById('historyList'); if(!items.length){ el.innerHTML = '<div class="history-meta">尚無回測紀錄</div>'; return; } el.innerHTML = items.map(item => `<div class="history-item"><div><strong>${item.symbol}</strong> ｜ ${item.bestStrategy}</div><div class="history-meta">${new Date(item.createdAt).toLocaleString('zh-TW')} ｜ ${item.timeframe} ｜ ${item.period}天 ｜ Avg Return ${item.avgReturn.toFixed(2)}%</div></div>`).join(''); }
        function updateSymbols() { const type = document.getElementById('marketType').value; const select = document.getElementById('symbol'); const symbols = type === 'crypto' ? cryptoSymbols : stockSymbols; select.innerHTML = symbols.map(s => `<option value="${s.value}">${s.label}</option>`).join(''); }
        document.querySelectorAll('.strategy-header').forEach(header => { header.addEventListener('click', (e) => { if (e.target.type !== 'checkbox') header.nextElementSibling.classList.toggle('show'); }); });
        function initChart() {
            const chartContainer = document.getElementById('chart');
            const width = chartContainer.clientWidth || chartContainer.offsetWidth || 800;
            chart = LightweightCharts.createChart(chartContainer, {
                width: width,
                height: 500,
                layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#333' },
                grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } },
                rightPriceScale: { borderColor: '#ddd' },
                timeScale: { borderColor: '#ddd' }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#34c759', downColor: '#ff3b30',
                borderDownColor: '#ff3b30', borderUpColor: '#34c759',
                wickDownColor: '#ff3b30', wickUpColor: '#34c759'
            });
            window.addEventListener('resize', () => {
                const w = chartContainer.clientWidth || chartContainer.offsetWidth || 800;
                chart.applyOptions({ width: w, height: 500 });
            });
        }
        async function fetchRealData(symbol, days) {
            // Fetch real OHLCV data from Binance (crypto) or Yahoo Finance (stocks)
            const isCrypto = !['AAPL','GOOGL','MSFT','TSLA','AMZN','META','NVDA','AMD'].includes(symbol);
            try {
                if (isCrypto) {
                    // Map timeframe to Binance interval
                    const tfMap = { '15m':'15m','1h':'1h','4h':'4h','1d':'1d','1w':'1w' };
                    const interval = tfMap[document.getElementById('timeframe').value] || '1d';
                    const limit = Math.min(days, 1000);
                    const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Binance API error');
                    const klines = await res.json();
                    return klines.map(k => ({
                        time: Math.floor(k[0] / 1000),
                        open: parseFloat(k[1]),
                        high: parseFloat(k[2]),
                        low: parseFloat(k[3]),
                        close: parseFloat(k[4]),
                        volume: parseFloat(k[5])
                    }));
                } else {
                    // Yahoo Finance for stocks
                    const end = Math.floor(Date.now() / 1000);
                    const start = end - days * 86400;
                    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${start}&period2=${end}&interval=1d`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Yahoo Finance error');
                    const json = await res.json();
                    const result = json?.chart?.result?.[0];
                    if (!result) throw new Error('No data');
                    const timestamps = result.timestamp || [];
                    const closes = result.indicators?.quote?.[0]?.close || [];
                    const opens = result.indicators?.quote?.[0]?.open || [];
                    const highs = result.indicators?.quote?.[0]?.high || [];
                    const lows = result.indicators?.quote?.[0]?.low || [];
                    const volumes = result.indicators?.quote?.[0]?.volume || [];
                    return timestamps.map((t, i) => ({
                        time: t,
                        open: opens[i] || 0,
                        high: highs[i] || 0,
                        low: lows[i] || 0,
                        close: closes[i] || 0,
                        volume: volumes[i] || 0
                    })).filter(d => d.close > 0);
                }
            } catch(e) {
                console.warn('Real data fetch failed, using fallback:', e.message);
                return null;
            }
        }
        
        function generateMockData(days) { const data = []; const symbol = document.getElementById('symbol').value; let price = startPrices[symbol] || 1000; const now = new Date(); for (let i = days; i >= 0; i--) { const time = new Date(now); time.setDate(time.getDate() - i); const timeUnix = Math.floor(time.getTime() / 1000); const volatility = 0.025; const trend = Math.sin(i / 30) * 0.01; const change = (Math.random() - 0.5) * 2 * volatility + trend; const open = price; const close = price * (1 + change); const high = Math.max(open, close) * (1 + Math.random() * 0.015); const low = Math.min(open, close) * (1 - Math.random() * 0.015); const volume = Math.random() * 1000000 + 500000; data.push({ time: timeUnix, open, high, low, close, volume }); price = close; } return data; }
        function calculateMA(data, period) { const ma = []; for (let i = 0; i < data.length; i++) { if (i < period - 1) ma.push(null); else { let sum = 0; for (let j = 0; j < period; j++) sum += data[i - j].close; ma.push(sum / period); } } return ma; }
        function calculateRSI(data, period) { const rsi = []; let gains = 0, losses = 0; for (let i = 1; i < data.length; i++) { const change = data[i].close - data[i-1].close; if (change > 0) gains += change; else losses += Math.abs(change); if (i < period) rsi.push(null); else { const avgGain = gains / period; const avgLoss = losses / period; const rs = avgLoss === 0 ? 100 : avgGain / avgLoss; rsi.push(100 - (100 / (1 + rs))); gains = gains * (period - 1) / period; losses = losses * (period - 1) / period; } } return rsi; }
        function calculateMACD(data, fast, slow, signal) { const ema = (arr, period) => { const k = 2 / (period + 1); const result = [arr[0]]; for (let i = 1; i < arr.length; i++) result.push(arr[i] * k + result[i-1] * (1 - k)); return result; }; const closes = data.map(d => d.close); const fastEMA = ema(closes, fast); const slowEMA = ema(closes, slow); const macdLine = fastEMA.map((f, i) => f - slowEMA[i]); const signalLine = ema(macdLine, signal); const histogram = macdLine.map((m, i) => m - signalLine[i]); return { macdLine, signalLine, histogram }; }
        function calculateBollinger(data, period, stdDev) { const bb = []; for (let i = 0; i < data.length; i++) { if (i < period - 1) bb.push({ upper: null, middle: null, lower: null }); else { let sum = 0; for (let j = 0; j < period; j++) sum += data[i - j].close; const ma = sum / period; let variance = 0; for (let j = 0; j < period; j++) variance += Math.pow(data[i - j].close - ma, 2); const sd = Math.sqrt(variance / period); bb.push({ upper: ma + stdDev * sd, middle: ma, lower: ma - stdDev * sd }); } } return bb; }
        function detectCandlestickPattern(data, i, patternType) { if (i < 2) return null; const curr = data[i], prev = data[i-1], prev2 = data[i-2]; const body = Math.abs(curr.close - curr.open); const upperShadow = curr.high - Math.max(curr.open, curr.close); const lowerShadow = Math.min(curr.open, curr.close) - curr.low; const totalRange = curr.high - curr.low; const isDoji = body < totalRange * 0.1; const isHammer = lowerShadow > body * 2 && upperShadow < body * 0.5; const isShootingStar = upperShadow > body * 2 && lowerShadow < body * 0.5; const isBullishEngulfing = prev.close < prev.open && curr.close > curr.open && curr.open < prev.close && curr.close > prev.open; const isBearishEngulfing = prev.close > prev.open && curr.close < curr.open && curr.open > prev.close && curr.close < prev.open; const isMorningStar = prev2.close < prev2.open && Math.abs(prev.close - prev.open) < (prev2.high - prev2.low) * 0.3 && curr.close > curr.open && curr.close > (prev2.open + prev2.close) / 2; const isEveningStar = prev2.close > prev2.open && Math.abs(prev.close - prev.open) < (prev2.high - prev2.low) * 0.3 && curr.close < curr.open && curr.close < (prev2.open + prev2.close) / 2; const pattern = patternType || 'all'; if (pattern === 'doji' && isDoji) return 'buy'; if (pattern === 'hammer' && isHammer && curr.close > curr.open) return 'buy'; if (pattern === 'hammer' && isShootingStar && curr.close < curr.open) return 'sell'; if (pattern === 'engulfing' && isBullishEngulfing) return 'buy'; if (pattern === 'engulfing' && isBearishEngulfing) return 'sell'; if (pattern === 'morning_star' && isMorningStar) return 'buy'; if (pattern === 'evening_star' && isEveningStar) return 'sell'; if (pattern === 'all') { if (isBullishEngulfing || isMorningStar || (isHammer && curr.close > curr.open)) return 'buy'; if (isBearishEngulfing || isEveningStar || (isShootingStar && curr.close < curr.open)) return 'sell'; } return null; }
        function backtestStrategy(data, strategy, params) { const trades = []; let position = null; let capital = parseFloat(document.getElementById('initialCapital').value); const initialCapital = capital; let wins = 0, losses = 0; let lookback = 60; if (strategy === 'ma') lookback = Math.max(params.short || 20, params.long || 50) + 10; if (strategy === 'rsi') lookback = Math.max(params.period || 14, 20); if (strategy === 'macd') lookback = 50; if (strategy === 'bollinger') lookback = Math.max(params.period || 20, 30); if (strategy === 'momentum') lookback = Math.max(params.days || 3, 5) + 5; if (strategy === 'candlestick') lookback = 10; if (strategy === 'volume') lookback = 25; const ma20 = calculateMA(data, params.short || 20); const ma50 = calculateMA(data, params.long || 50); const rsi = calculateRSI(data, params.rsiPeriod || 14); const macd = calculateMACD(data, params.macdFast || 12, params.macdSlow || 26, params.macdSignal || 9); const bb = calculateBollinger(data, params.bbPeriod || 20, params.bbStd || 2); let avgVolume = 0; for (let i = Math.max(0, lookback - 20); i < lookback; i++) avgVolume += data[i].volume; avgVolume = avgVolume / 20; const obv = [data[0].volume]; for (let i = 1; i < data.length; i++) obv.push(data[i].close > data[i-1].close ? obv[i-1] + data[i].volume : data[i].close < data[i-1].close ? obv[i-1] - data[i].volume : obv[i-1]);
            for (let i = lookback; i < data.length; i++) { const candle = data[i]; let signal = null; switch(strategy) { case 'ma': if (ma20[i-1] && ma50[i-1] && ma20[i] && ma50[i]) { if (ma20[i-1] < ma50[i-1] && ma20[i] > ma50[i]) signal = 'buy'; else if (ma20[i-1] > ma50[i-1] && ma20[i] < ma50[i]) signal = 'sell'; } break; case 'rsi': if (rsi[i] !== null) { if (rsi[i] < (params.oversold || 30)) signal = 'buy'; else if (rsi[i] > (params.overbought || 70)) signal = 'sell'; } break; case 'macd': if (macd.histogram[i-1] !== null && macd.histogram[i] !== null) { if (macd.histogram[i-1] < 0 && macd.histogram[i] > 0) signal = 'buy'; else if (macd.histogram[i-1] > 0 && macd.histogram[i] < 0) signal = 'sell'; } break; case 'bollinger': if (bb[i].upper && candle.close < bb[i].lower) signal = 'buy'; else if (bb[i].upper && candle.close > bb[i].upper) signal = 'sell'; break; case 'momentum': if (i > params.days) { let upDays = 0; for (let j = 1; j <= params.days; j++) if (data[i-j].close > data[i-j-1].close) upDays++; if (upDays === parseInt(params.days)) signal = 'buy'; else if (upDays === 0) signal = 'sell'; } break; case 'candlestick': signal = detectCandlestickPattern(data, i, params.pattern || 'all'); break; case 'volume': const volumeRatio = candle.volume / avgVolume; const type = params.volumeType || 'breakout'; if (type === 'breakout') { if (volumeRatio > (params.threshold || 1.5)) { const high20 = Math.max(...data.slice(Math.max(0, i-20), i).map(d => d.high)); const low20 = Math.min(...data.slice(Math.max(0, i-20), i).map(d => d.low)); if (candle.close > high20 && candle.close > candle.open) signal = 'buy'; else if (candle.close < low20 && candle.close < candle.open) signal = 'sell'; } } else if (type === 'volume_surge') { const priceChange = (candle.close - candle.open) / candle.open; if (volumeRatio > (params.threshold || 1.5) && priceChange > 0.01) signal = 'buy'; else if (volumeRatio < 0.7 && priceChange < -0.01) signal = 'sell'; } else if (type === 'obv') { if (i > 10) { const obvMa = (obv[i] + obv[i-1] + obv[i-2] + obv[i-3] + obv[i-5]) / 5; if (obv[i] > obvMa && obv[i-1] <= obvMa) signal = 'buy'; else if (obv[i] < obvMa && obv[i-1] >= obvMa) signal = 'sell'; } } break; }
                if (signal === 'buy' && !position) position = { entryPrice: candle.close, entryTime: candle.time };
                else if (signal === 'sell' && position) { const profit = ((candle.close - position.entryPrice) / position.entryPrice) * capital; capital += profit; profit > 0 ? wins++ : losses++; trades.push({ entryPrice: position.entryPrice, exitPrice: candle.close, profit: profit, profitPercent: ((candle.close - position.entryPrice) / position.entryPrice * 100) }); position = null; }
            }
            if (position && data.length > 0) { const lastCandle = data[data.length - 1]; const profit = ((lastCandle.close - position.entryPrice) / position.entryPrice) * capital; capital += profit; }
            const totalReturn = ((capital - initialCapital) / initialCapital) * 100; const winRate = (wins + losses) > 0 ? (wins / (wins + losses)) * 100 : 0; const maxDrawdown = Math.abs(totalReturn) * 0.4;
            return { trades, totalReturn, winRate, totalTrades: wins + losses, maxDrawdown, finalCapital: capital, initialCapital };
        }
        function buildInsight(strategyResults, bestStrategy, avgReturn, avgWinRate) { const best = strategyResults.find(s => s.name === bestStrategy); return `<strong>最佳策略：</strong>${bestStrategy}<br><strong>平均報酬：</strong>${avgReturn.toFixed(2)}%<br><strong>平均勝率：</strong>${avgWinRate.toFixed(1)}%<br><strong>策略建議：</strong>${avgReturn > 0 ? '目前這組參數有正期望，可再進一步做 walk-forward / fee / slippage 驗證。' : '目前這組參數偏弱，建議調整標的、週期或重新優化進出場條件。'}<br><strong>最終資金（最佳策略）：</strong>$${best?.result.finalCapital.toLocaleString() || '0'}`; }
        async function runBacktest() { const loading = document.getElementById('loading'); const stats = document.getElementById('stats'); const results = document.getElementById('results'); loading.style.display = 'block'; stats.style.display = 'none'; results.style.display = 'none'; const period = parseInt(document.getElementById('period').value); let data = await fetchRealData(document.getElementById('symbol').value, period); if (!data || data.length < 50) { console.warn('Real API unavailable, using fallback mock data'); data = generateMockData(period); document.getElementById('dataBadge').textContent = '⚠️ 模擬數據'; document.getElementById('dataBadge').style.background = 'rgba(255,149,0,0.15)'; document.getElementById('dataBadge').style.color = '#ff9500'; } else { document.getElementById('dataBadge').textContent = '✅ 真實數據'; document.getElementById('dataBadge').style.background = 'rgba(52,199,89,0.15)'; document.getElementById('dataBadge').style.color = '#34c759'; } candleSeries.setData(data); chart.timeScale().fitContent(); const cc = document.getElementById('chart'); if(cc) chart.resize(cc.clientWidth || 800, 500); const strategies = []; if (document.getElementById('ma-cross-enable').checked) strategies.push({ name: 'MA 交叉', id: 'ma', params: { short: parseInt(document.getElementById('ma-short').value), long: parseInt(document.getElementById('ma-long').value) } }); if (document.getElementById('rsi-enable').checked) strategies.push({ name: 'RSI', id: 'rsi', params: { rsiPeriod: parseInt(document.getElementById('rsi-period').value), oversold: parseInt(document.getElementById('rsi-oversold').value), overbought: parseInt(document.getElementById('rsi-overbought').value) } }); if (document.getElementById('macd-enable').checked) strategies.push({ name: 'MACD', id: 'macd', params: { macdFast: parseInt(document.getElementById('macd-fast').value), macdSlow: parseInt(document.getElementById('macd-slow').value), macdSignal: parseInt(document.getElementById('macd-signal').value) } }); if (document.getElementById('bollinger-enable').checked) strategies.push({ name: '布林通道', id: 'bollinger', params: { bbPeriod: parseInt(document.getElementById('bb-period').value), bbStd: parseFloat(document.getElementById('bb-std').value) } }); if (document.getElementById('momentum-enable').checked) strategies.push({ name: '動量', id: 'momentum', params: { days: parseInt(document.getElementById('momentum-days').value) } }); if (document.getElementById('candlestick-enable').checked) strategies.push({ name: 'K線型態', id: 'candlestick', params: { pattern: document.getElementById('candlestick-type').value } }); if (document.getElementById('volume-enable').checked) strategies.push({ name: '量價關係', id: 'volume', params: { threshold: parseFloat(document.getElementById('volume-threshold').value), volumeType: document.getElementById('volume-type').value } });
            if (strategies.length === 0) { alert('請至少選擇一個策略'); loading.style.display = 'none'; return; }
            let bestStrategy = null, bestReturn = -Infinity; const strategyResults = strategies.map(s => { const result = backtestStrategy(data, s.id, s.params); if (result.totalReturn > bestReturn) { bestReturn = result.totalReturn; bestStrategy = s.name; } return { ...s, result }; });
            const totalTrades = strategyResults.reduce((sum, s) => sum + s.result.totalTrades, 0); const avgReturn = strategyResults.reduce((sum, s) => sum + s.result.totalReturn, 0) / strategyResults.length; const avgWinRate = strategyResults.reduce((sum, s) => sum + s.result.winRate, 0) / strategyResults.length;
            document.getElementById('totalReturn').textContent = (avgReturn >= 0 ? '+' : '') + avgReturn.toFixed(2) + '%'; document.getElementById('totalReturn').className = 'stat-value ' + (avgReturn >= 0 ? 'positive' : 'negative'); document.getElementById('maxDrawdown').textContent = '-' + (Math.abs(avgReturn) * 0.5).toFixed(2) + '%'; document.getElementById('winRate').textContent = avgWinRate.toFixed(1) + '%'; document.getElementById('totalTrades').textContent = totalTrades; document.getElementById('finalCapital').textContent = '$' + parseFloat(document.getElementById('initialCapital').value).toLocaleString();
            document.getElementById('strategyResults').innerHTML = strategyResults.map(s => `<div class="strategy-result"><div class="strategy-result-header"><span class="strategy-result-title">${s.name}</span><span style="font-size: 20px; font-weight: 700; color: ${s.result.totalReturn >= 0 ? '#34c759' : '#ff3b30'}">${s.result.totalReturn >= 0 ? '+' : ''}${s.result.totalReturn.toFixed(2)}%</span></div><div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; font-size: 13px; color: var(--text-secondary);"><div>交易: ${s.result.totalTrades}次</div><div>勝率: ${s.result.winRate.toFixed(1)}%</div><div>回撤: -${s.result.maxDrawdown.toFixed(2)}%</div><div>資金: $${s.result.finalCapital.toLocaleString()}</div></div></div>`).join('');
            const insightBox = document.getElementById('insightBox'); insightBox.style.display = 'block'; insightBox.innerHTML = buildInsight(strategyResults, bestStrategy, avgReturn, avgWinRate);
            latestSessionPayload = { createdAt: new Date().toISOString(), symbol: document.getElementById('symbol').value, marketType: document.getElementById('marketType').value, timeframe: document.getElementById('timeframe').value, period, initialCapital: parseFloat(document.getElementById('initialCapital').value), bestStrategy, avgReturn, avgWinRate, totalTrades, strategyResults: strategyResults.map(s => ({ name: s.name, totalReturn: s.result.totalReturn, winRate: s.result.winRate, totalTrades: s.result.totalTrades, maxDrawdown: s.result.maxDrawdown, finalCapital: s.result.finalCapital, params: s.params })) };
            loading.style.display = 'none'; stats.style.display = 'grid'; results.style.display = 'block'; }
        function saveSession() { if (!latestSessionPayload) return alert('請先執行一次回測'); const items = getSessions(); items.unshift(latestSessionPayload); setSessions(items.slice(0, 20)); renderHistory(); alert('已保存回測紀錄'); }
        function exportSession() { if (!latestSessionPayload) return alert('請先執行一次回測'); const blob = new Blob([JSON.stringify(latestSessionPayload, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `backtest-${latestSessionPayload.symbol}-${Date.now()}.json`; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
        updateSymbols();
        requestAnimationFrame(() => {
            initChart();
            renderHistory();
            runBacktest();
        });

        // Sync chart + run backtest when symbol changes
        async function onSymbolChange() {
            const marketType = document.getElementById('marketType').value;
            const symbol = document.getElementById('symbol').value;

            // Show loading state immediately
            const loading = document.getElementById('loading');
            const stats = document.getElementById('stats');
            const results = document.getElementById('results');
            if (loading) loading.style.display = 'block';
            if (stats) stats.style.display = 'none';
            if (results) results.style.display = 'none';

            // Fetch fundamental data in parallel with backtest
            if (marketType === 'stock') {
                fetchFundamentalData(symbol);
            } else {
                document.getElementById('fundamentalContent').innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text-secondary);">
                        <div style="font-size:24px;margin-bottom:8px;">₿</div>
                        <div style="font-size:13px;">加密貨幣無基本分析數據</div>
                    </div>`;
            }

            // Run full backtest: updates chart + all strategy stats
            await runBacktest();
        }

        async function fetchFundamentalData(symbol) {
            const el = document.getElementById('fundamentalContent');
            el.innerHTML = '<div class="fundamental-loading">正在載入基本數據...</div>';
            try {
                // Call Vercel serverless API route (bypasses CORS)
                const resp = await fetch(`/api/fundamental?symbol=${encodeURIComponent(symbol)}`);
                const json = await resp.json();

                if (!json.success || !json.data) {
                    throw new Error(json.error || 'No data returned');
                }

                const d = json.data;
                const pctClass = (v) => {
                    if (v === 'N/A') return 'fundamental-row-value';
                    const n = parseFloat(v);
                    return 'fundamental-row-value fundamental-value ' + (n > 0 ? 'positive' : 'negative');
                };

                el.innerHTML = `
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);">
                        <div style="font-size:28px;font-weight:700;">${d.price !== 'N/A' ? '$' + d.price : ''}</div>
                        <div>
                            <div style="font-size:14px;font-weight:600;color:var(--text);">${d.longName}</div>
                            <div style="font-size:11px;color:var(--text-secondary);">${d.sector !== 'N/A' ? d.sector + ' · ' + d.industry : d.currency}</div>
                        </div>
                        <div style="margin-left:auto;text-align:right;">
                            <div style="font-size:11px;color:var(--text-secondary);">分析師評級</div>
                            <div style="font-size:12px;font-weight:600;color:var(--primary);text-transform:capitalize;">${d.recommendation}</div>
                        </div>
                    </div>
                    <div class="fundamental-section-title">估值指標</div>
                    <div class="fundamental-grid">
                        <div class="fundamental-item"><div class="fundamental-label">P/E 本益比</div><div class="fundamental-value">${d.pe}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">Forward P/E</div><div class="fundamental-value">${d.forwardPE}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">P/B 股價淨值比</div><div class="fundamental-value">${d.priceToBook}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">總市值</div><div class="fundamental-value">${d.marketCap}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">企業價值</div><div class="fundamental-value">${d.enterpriseValue}</div></div>
                        <div class="fundamental-item"><div class="fundamental-label">Beta</div><div class="fundamental-value">${d.beta}</div></div>
                    </div>
                    <div class="fundamental-section">
                        <div class="fundamental-section-title">獲利能力</div>
                        <div class="fundamental-row"><span class="fundamental-row-label">營收 (TTM)</span><span class="fundamental-row-value">${d.revenue}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">毛利率</span><span class="${pctClass(d.grossMargin)}">${d.grossMargin}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">營業利率</span><span class="${pctClass(d.opMargin)}">${d.opMargin}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">淨利率</span><span class="${pctClass(d.netMargin)}">${d.netMargin}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">ROE 股東權益報酬</span><span class="${pctClass(d.roe)}">${d.roe}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">自由現金流</span><span class="fundamental-row-value">${d.freeCashflow}</span></div>
                    </div>
                    <div class="fundamental-section">
                        <div class="fundamental-section-title">股利 & 風險</div>
                        <div class="fundamental-row"><span class="fundamental-row-label">股息</span><span class="fundamental-row-value">${d.dividend}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">殖利率</span><span class="fundamental-row-value fundamental-value positive">${d.divYield}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">EPS 每股盈餘</span><span class="fundamental-row-value">$${d.eps}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">負債/權益</span><span class="fundamental-row-value">${d.debtToEquity}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">分析師目標價</span><span class="fundamental-row-value">${d.analystTarget}</span></div>
                    </div>
                    <div class="fundamental-section">
                        <div class="fundamental-section-title">交易量 & 區間</div>
                        <div class="fundamental-row"><span class="fundamental-row-label">平均日成交量</span><span class="fundamental-row-value">${d.avgVolume}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">52W 高</span><span class="fundamental-row-value" style="color:var(--danger)">$${d.week52High}</span></div>
                        <div class="fundamental-row"><span class="fundamental-row-label">52W 低</span><span class="fundamental-row-value" style="color:var(--accent)">$${d.week52Low}</span></div>
                    </div>
                `;
            } catch (e) {
                el.innerHTML = `<div class="fundamental-error">無法載入基本數據（${symbol}）<br><span style="font-size:11px;color:var(--text-secondary);">API 錯誤：${e.message}</span></div>`;
            }
        }
    </script>
